name: Deploy to GitHub Pages

# This repo is the source of truth for the deck box builder. Every push to main
# builds the app and publishes it to GitHub Pages; jonas-jensen.com embeds the
# live deploy by proxying /apps/deck-box/* to the Pages URL, so pushing here is
# what ships the change to the desktop — nothing is re-vendored by hand.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
